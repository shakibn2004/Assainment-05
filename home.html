<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Traker</title>
    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <!-- home responsive -->
     <link rel="stylesheet" href="./home-responsive.css">
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>

<body>

    <header>
        <nav class="w-144/160 m-auto flex justify-between items-center py-5 ">
            <div class="nav-start flex items-center gap-2">
                <img class="w-9" src="./assets/github-logo.png" alt="Github Logo">
                <h2 class="text-2xl font-semibold cursor-default">Github Issues Traker</h2>
            </div>

            <div class="nav-end flex gap-2 items-center">
                <input id="search" class="outline-none shadow-[0_0_2px_black]/50 p-4 h-9 rounded" type="search"
                    placeholder="Search Issues....">
                <button class="btn font-semibold">+ New Issue</button>
            </div>
        </nav>
    </header>

    <main id="main" class="w-130/160 m-auto mt-12">
        <section class="toggle-tab flex gap-6">
            <button id="all-tab" class="btn-secondary px-9 py-3 shadow-[0_0_2px_black]/40 rounded">All</button>
            <button id="open-tab" class=" px-9 py-3 shadow-[0_0_2px_black]/40 rounded">Open</button>
            <button id="closed-tab" class=" px-9 py-3 shadow-[0_0_2px_black]/40 rounded">Closed</button>
        </section>

        <section id="issues-status" class="flex justify-between items-center p-6 mt-4 shadow-[0_0_2px_black]/30">
            <div class="status-start flex gap-2 items-center">
                <img class="w-13 h-13" src="./assets/Aperture.png" alt="Aperture">
                <div class="status-content space-y-1">
                    <h2 class="text-2xl font-semibold"><span id="total-issues">50</span> Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

            <div class="status-end flex gap-3">
                <div class="open text-sm"><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</div>
                <div class="Closed text-sm"><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</div>
            </div>
        </section>

        <div id="loader" class="flex justify-center my-10">
            <span class="loading loading-dots loading-xl"></span>
        </div>

        <section id="issue-cards" class="iusse-cards grid grid-cols-4 p-6 gap-3">
        </section>

        <!-- Dialog -->
        <div id="dialog-container">

        </div>
    </main>

    <script src="./app.js"></script>
</body>

</html>
