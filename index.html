<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Traker</title>
    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="flex items-center h-screen">

    <header class="login-container flex flex-col p-6 w-130 mx-auto bg-white text-center rounded shadow-[0_0_2px_black]">
        <div class="title-container flex flex-col items-center space-y-2">
            <img class="w-fit" src="./assets/github-logo.png" alt="Github Logo">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
        </div>

        <form action="" class="flex flex-col space-y-4 mt-5">
            <label class="text-left" for="username">Username</label>
            <input class="outline-none" id="username" type="text" placeholder="Enter Username">

            <label class="text-left" for="password">Password</label>
            <input class="outline-none" id="password" type="password" placeholder="Enter Password">

            <button class="btn" type="submit">Sign In</button>

        </form>

        <div class="other-content mt-6">
            <h4 class="">OR</h4>
            <p class="my-6">Demo Credentials:</p>
            <h2 class="font-semibold">Username: <span class="font-normal">admin</span></h2>
            <h2 class="font-semibold">Password: <span class="font-normal">admin123</span></h2>
        </div>
    </header>

    <script src="./app.js"></script>
</body>

</html>
